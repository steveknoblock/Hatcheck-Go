<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatcheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --border: #2a2a2a;
            --accent: #c8f04b;
            --accent-dim: #8aab2a;
            --text: #e8e8e8;
            --text-dim: #666;
            --text-muted: #444;
            --danger: #ff4d4d;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            overflow: hidden;
        }

        /* Header */
        header {
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-family: var(--sans);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
            color: var(--accent);
        }

        header .tagline {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        header .status {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        header .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Layout */
        .workspace {
            display: flex;
            height: calc(100vh - 48px);
            overflow: hidden;
        }

        /* Left Panel */
        .panel-left {
            width: 280px;
            min-width: 160px;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-label {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .object-count {
            font-size: 10px;
            color: var(--accent);
            font-weight: 500;
        }

        .hash-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .hash-list::-webkit-scrollbar {
            width: 4px;
        }

        .hash-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .hash-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .hash-item {
            padding: 8px 16px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
            word-break: break-all;
            line-height: 1.6;
        }

        .hash-item:hover {
            color: var(--text);
            background: rgba(200, 240, 75, 0.04);
            border-left-color: var(--text-muted);
        }

        .hash-item.active {
            color: var(--accent);
            background: rgba(200, 240, 75, 0.06);
            border-left-color: var(--accent);
        }

        .hash-item.new {
            animation: highlight 1.5s ease forwards;
        }

        @keyframes highlight {
            0% { background: rgba(200, 240, 75, 0.2); color: var(--accent); }
            100% { background: rgba(200, 240, 75, 0.06); color: var(--accent); }
        }

        .empty-state {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.8;
        }

        .refresh-btn {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 10px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s ease;
            letter-spacing: 0.05em;
        }

        .refresh-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Divider */
        .divider {
            width: 4px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            position: relative;
            transition: background 0.15s ease;
        }

        .divider:hover, .divider.dragging {
            background: var(--accent);
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 32px;
            background: inherit;
            border-radius: 1px;
        }

        /* Right Panel */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 200px;
            overflow: hidden;
        }

        .editor-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            flex-shrink: 0;
        }

        .current-hash {
            font-size: 11px;
            color: var(--text-dim);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current-hash span {
            color: var(--accent);
        }

        .stash-btn {
            padding: 6px 16px;
            background: var(--accent);
            border: none;
            color: #0e0e0e;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .stash-btn:hover {
            background: #d4f55a;
        }

        .stash-btn:active {
            background: var(--accent-dim);
        }

        .stash-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .editor-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.7;
            border: none;
            outline: none;
            resize: none;
            padding: 20px 24px;
            letter-spacing: 0.01em;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            font-size: 11px;
            color: var(--text);
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.2s ease;
            pointer-events: none;
            z-index: 100;
            max-width: 320px;
            word-break: break-all;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        .toast-label {
            color: var(--text-dim);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>Hatcheck</h1>
    <span class="tagline">Content Addressable Store</span>
    <div class="status">
        <div class="status-dot"></div>
        <span id="status-text">connected</span>
    </div>
</header>

<div class="workspace">
    <div class="panel-left" id="panel-left">
        <div class="panel-header">
            <span class="panel-label">Objects</span>
            <div style="display:flex;align-items:center;gap:8px">
                <span class="object-count" id="object-count">—</span>
                <button class="refresh-btn" onclick="loadHashes()">↺</button>
            </div>
        </div>
        <div class="hash-list" id="hash-list">
            <div class="empty-state">No objects in store.<br>Write something and stash it.</div>
        </div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="panel-right">
        <div class="editor-header">
            <div class="current-hash" id="current-hash">
                <span>—</span>
            </div>
            <button class="stash-btn" id="stash-btn" onclick="stashContent()">Stash</button>
        </div>
        <div class="editor-area">
            <textarea id="editor" placeholder="Write something here, then click Stash to store it in the CAS..."></textarea>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <div class="toast-label" id="toast-label">Stashed</div>
    <div id="toast-message"></div>
</div>

<script>
    const API = 'http://localhost:8090';
    let currentHash = null;

    // --- Draggable Divider ---
    const divider = document.getElementById('divider');
    const panelLeft = document.getElementById('panel-left');
    let dragging = false;

    divider.addEventListener('mousedown', (e) => {
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const workspace = panelLeft.parentElement;
        const rect = workspace.getBoundingClientRect();
        const newWidth = e.clientX - rect.left;
        const min = 160;
        const max = workspace.offsetWidth - 200;
        panelLeft.style.width = Math.max(min, Math.min(max, newWidth)) + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });

    // --- Load Hashes ---
    async function loadHashes(highlightHash = null) {
        try {
            const res = await fetch(`${API}/list`);
            if (!res.ok) throw new Error('Failed to fetch list');
            const hashes = await res.json();

            const list = document.getElementById('hash-list');
            const count = document.getElementById('object-count');

            count.textContent = hashes.length;

            if (hashes.length === 0) {
                list.innerHTML = '<div class="empty-state">No objects in store.<br>Write something and stash it.</div>';
                return;
            }

            list.innerHTML = hashes.map(hash => `
                <div class="hash-item ${hash === currentHash ? 'active' : ''} ${hash === highlightHash ? 'new' : ''}"
                     onclick="fetchContent('${hash}')"
                     title="${hash}">
                    ${hash}
                </div>
            `).join('');

        } catch (err) {
            showToast('Error loading objects', err.message, true);
        }
    }

    // --- Fetch Content ---
    async function fetchContent(hash) {
        try {
            const res = await fetch(`${API}/fetch?hash=${hash}`);
            if (!res.ok) throw new Error('Not found');
            const data = await res.text();

            currentHash = hash;
            document.getElementById('editor').value = data.trimEnd();
            document.getElementById('current-hash').innerHTML = `<span>${hash}</span>`;

            // Update active state in list
            document.querySelectorAll('.hash-item').forEach(el => {
                el.classList.toggle('active', el.title === hash);
            });

        } catch (err) {
            showToast('Error', err.message, true);
        }
    }

    // --- Stash Content ---
    async function stashContent() {
        const content = document.getElementById('editor').value;
        const btn = document.getElementById('stash-btn');

        btn.disabled = true;
        btn.textContent = 'Stashing...';

        try {
            const res = await fetch(`${API}/stash`, {
                method: 'POST',
                body: content,
            });

            if (!res.ok) throw new Error('Stash failed');

            const hash = (await res.text()).trim();
            currentHash = hash;
            document.getElementById('current-hash').innerHTML = `<span>${hash}</span>`;

            await loadHashes(hash);
            showToast('Stashed', hash);

        } catch (err) {
            showToast('Error', err.message, true);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Stash';
        }
    }

    // --- Toast ---
    function showToast(label, message, isError = false) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-label').textContent = label;
        document.getElementById('toast-message').textContent = message;
        toast.classList.toggle('error', isError);
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // --- Init ---
    loadHashes();
</script>
</body>
</html>
